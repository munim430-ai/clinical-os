name: Publish PWA to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Publish Web App to GitHub Pages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout project repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Bun and install dependencies
        uses: ./.github/actions/setup-bun-install

      - name: Build SQLite database
        run: bun run build:db
        shell: bash

      - name: Build web app
        run: bun run build:web
        shell: bash

      - name: Copy database to dist
        run: cp public/database.sqlite dist/database.sqlite
        shell: bash

      - name: Publish web app
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
